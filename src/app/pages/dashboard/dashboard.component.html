<div class="dashboard-page">

  <!-- Page header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-sub">Manage your payments and transactions in one click</p>
    </div>
    <button class="widget-btn">
      <i class="pi pi-plus"></i> Add widget
    </button>
  </div>

  <!-- Two-column content area: main grid + right panel -->
  <div class="page-body">

    <!-- Left/centre grid -->
    <div class="content-grid">
      <div class="grid-top">
        <app-balance-card      class="balance-col" />
        <app-transaction-chart class="chart-col"   />
      </div>
      <div class="grid-bottom">
        <app-financial-goals class="goals-col"    />
        <app-all-expenses    class="expenses-col" />
      </div>
    </div>

    <!-- Right panel (cards, limit, recent tx) -->
    <aside class="right-panel">
      <app-credit-card         />
      <app-daily-limit         />
      <app-recent-transactions />
    </aside>

  </div>

</div>
