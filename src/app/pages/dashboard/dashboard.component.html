<div class="dashboard-page">

  <!-- Page header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">{{label.dashboard.title}}</h1>
      <p class="page-sub">{{label.dashboard.desc}}</p>
    </div>
    <button class="widget-btn">
      <i class="pi pi-plus"></i> {{label.dashboard.addWidget}}
    </button>
  </div>

  <!-- Two-column content area -->
  <div class="page-body">

    <!-- Left -->
    <div class="content-grid">
      <div class="grid-top">
        <app-balance-card      class="balance-col" />
        <app-transaction-chart class="chart-col"   />
      </div>
      <div class="grid-bottom">
        <app-financial-goals class="goals-col"    />
        <app-all-expenses    class="expenses-col" />
      </div>
    </div>

    <!-- Right -->
    <aside class="right-panel">
      <app-credit-card         />
      <app-daily-limit         />
      <app-recent-transactions />
    </aside>

  </div>

</div>
