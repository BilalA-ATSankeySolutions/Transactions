<!-- credit-card.component.html -->
<div class="cards-section">

  <div class="section-head">
    <h3 class="section-title">Your Cards</h3>
    <button class="add-btn"><i class="pi pi-plus"></i></button>
  </div>

  <div class="card-visual">
    @if (card.isPremium) {
      <span class="premium-tag">Premium</span>
    }

    <div class="card-top">
      <span class="visa-text">VISA</span>
      <span class="nfc-icon">
        <!-- NFC / contactless wave icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M5 12.5A7 7 0 0 1 12 6" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M8 12.5A4 4 0 0 1 12 9" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="12.5" r="1.5" fill="rgba(255,255,255,0.85)"/>
        </svg>
      </span>
    </div>

    <!-- Wave lines -->
    <div class="wave-zone">
      <svg viewBox="0 0 230 55" preserveAspectRatio="none" class="wave-svg">
        <path d="M0 38 C45 8 85 52 130 28 C170 4 205 46 230 22"
              stroke="rgba(255,255,255,0.18)" stroke-width="1.4" fill="none"/>
        <path d="M0 48 C55 18 95 58 138 36 C178 14 210 52 230 34"
              stroke="rgba(255,255,255,0.1)" stroke-width="1.4" fill="none"/>
      </svg>
    </div>

    <div class="card-number">{{ card.number }}</div>
    <div class="card-holder">{{ card.holder }}</div>
  </div>

</div>
